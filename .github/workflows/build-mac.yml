name: Build Mac Executable

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "package.json"
      - "electron/**"
      - "client/**"
      - "server/**"
      - "shared/**"
      - "drizzle/**"
      - ".github/workflows/build-mac.yml"

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.4.1

      - name: Install dependencies
        run: pnpm install

      - name: Build client & server
        run: pnpm build

      - name: Build CJS server bundle
        run: pnpm build:cjs

      - name: Clean old releases
        run: rm -rf release

      - name: Build Mac executables
        run: npx electron-builder --mac

      - name: Upload Mac artifacts
        uses: actions/upload-artifact@v4
        with:
          name: judge-ai-mac
          path: release/*.dmg
          if-no-files-found: ignore

      - name: Upload Mac ZIP
        uses: actions/upload-artifact@v4
        with:
          name: judge-ai-mac-zip
          path: release/*.zip
          if-no-files-found: ignore
