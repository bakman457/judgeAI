name: Build Mac Executable

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "package.json"
      - "pnpm-lock.yaml"
      - "electron/**"
      - "client/**"
      - "server/**"
      - "shared/**"
      - "drizzle/**"
      - ".github/workflows/build-mac.yml"
      - ".gitmodules"

jobs:
  build-mac:
    runs-on: macos-latest
    timeout-minutes: 90
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false
      DEBUG: electron-builder
      SKIP_NOTARIZATION: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack and activate repository pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.4.1 --activate
          pnpm --version

      - name: Install system dependencies (libvips for sharp)
        run: |
          brew install vips
          brew install pkg-config

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build macOS distributable
        run: npm run dist:mac

      - name: List release artifacts
        run: |
          echo "Release directory"
          ls -lah release || true
          echo "Mac artifacts"
          find release -maxdepth 2 -type f ( -name "*.zip" -o -name "*.dmg" ) -print || true

      - name: Upload Mac artifacts
        uses: actions/upload-artifact@v4
        with:
          name: judge-ai-mac
          path: |
            release/*.zip
            release/*.dmg
          if-no-files-found: error
