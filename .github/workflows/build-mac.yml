name: Build Mac Executable

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "package.json"
      - "electron/**"
      - "client/**"
      - "server/**"
      - "shared/**"
      - "drizzle/**"
      - ".github/workflows/build-mac.yml"

jobs:
  build-mac:
    runs-on: macos-latest
    timeout-minutes: 30
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install system dependencies (libvips for sharp)
        run: brew install vips

      - name: Install dependencies
        run: pnpm install

      - name: Build client & server
        run: pnpm build

      - name: Build CJS server bundle
        run: pnpm build:cjs

      - name: Build Mac executables
        run: npx electron-builder --mac

      - name: Upload Mac ZIP
        uses: actions/upload-artifact@v4
        with:
          name: judge-ai-mac-zip
          path: release/*.zip
          if-no-files-found: error
